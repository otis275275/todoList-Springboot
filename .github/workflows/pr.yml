name: PR Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # 1. Job Lint (Job 1 trong 3 job thêm)
  lint-code:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Linting Placeholder
        run: echo "Chạy các tool kiểm tra format code (vd. ESLint, Checkstyle) tại đây..."

  # 2. Job Build (đã tách riêng)







  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint-code
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Backend Build ---
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build Backend (skip tests)
        run: mvn clean package -DskipTests
        working-directory: ./be

      # --- Frontend Build ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './fe/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./fe

      - name: Build Frontend
        run: npm run build
        working-directory: ./fe

  # 3. Job Test (đã tách riêng)
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Backend Test ---
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test Backend
        run: mvn test
        working-directory: ./be

      # --- Frontend Test ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './fe/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./fe

      - name: Test Frontend
        run: npm test
        working-directory: ./fe
        env:
          CI: true

  # 4. Job Security Scan (Job 2 trong 3 job thêm)
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Security Scanner
        run: echo "Chạy SonarQube, Trivy, hoặc Snyk để quét lỗ hổng bảo mật tại đây..."

  # 5. Job Notify / Preview (Job 3 trong 3 job thêm)
  deploy-preview:
    name: Deploy Preview & Notify
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - name: Deploy Environment Placeholder
        run: echo "Triển khai môi trường Preview cho PR này và gửi thông báo qua Slack/Email..."
